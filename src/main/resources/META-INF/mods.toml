modLoader="javafml"
loaderVersion="[47,)"
license="MIT"

[[mods]]
modId="curio_trinkets_bridge"
version="${file.jarVersion}"
displayName="Curio Trinkets Bridge"
logoFile="icon.png"
authors="MangZai"
description='''
自动将 Trinkets (Fabric) 饰品桥接至 Curios API，并交由 Accessories/cclayer 使用 Accessories 原生 UI 统一显示。
配合 Sinytra Connector 与 Accessories 使用，让基于 Trinkets/Curios 的饰品统一进入 Accessories 界面。

Automatically bridges Trinkets (Fabric) accessories to the Curios API, then lets Accessories/cclayer display them in the native Accessories UI.
Works with Sinytra Connector and Accessories to unify Trinkets/Curios accessories in the Accessories screen.
'''

[[dependencies.curio_trinkets_bridge]]
modId="forge"
mandatory=true
versionRange="[47,)"
ordering="NONE"
side="BOTH"

[[dependencies.curio_trinkets_bridge]]
modId="minecraft"
mandatory=true
versionRange="[1.20.1,1.21)"
ordering="NONE"
side="BOTH"

[[dependencies.curio_trinkets_bridge]]
modId="curios"
mandatory=true
versionRange="[0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.curio_trinkets_bridge]]
modId="accessories"
mandatory=true
versionRange="[1.0.0-beta.36,)"
ordering="AFTER"
side="BOTH"

[[dependencies.curio_trinkets_bridge]]
modId="cclayer"
mandatory=true
versionRange="[0,)"
ordering="AFTER"
side="BOTH"

[[mixins]]
config = "curio_trinkets_bridge.mixins.json"
